<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IRIS-Intelligent Rental Insight System</title>
    
    <link rel="icon" type="image/png" href="icon-192.png">
    
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="manifest" href="manifest.json">
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            overflow: hidden; 
            background-color: #1B4375; 
        }
        iframe { 
            width: 100%; 
            height: calc(100% + 45px); 
            border: none; 
            display: block; 
        }
        
        /* 🌟 추가된 로딩 화면 디자인 */
        #loading-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #1B4375; /* 배경색 완벽 일치 */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999; /* 화면 가장 맨 앞으로 배치 */
            color: #ffffff;
            font-family: 'Malgun Gothic', -apple-system, sans-serif;
            transition: opacity 0.5s ease-out; /* 부드럽게 사라지는 효과 */
        }
        
        /* 🌀 빙글빙글 도는 스피너 애니메이션 */
        .spinner {
            width: 45px;
            height: 45px;
            border: 5px solid rgba(255, 255, 255, 0.15);
            border-top: 5px solid #ffffff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .loading-text {
            font-size: 17px;
            font-weight: bold;
            letter-spacing: 0.5px;
        }
        
        .loading-subtext {
            font-size: 13px;
            color: #90A4AE;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    
    <div id="loading-screen">
        <div class="spinner"></div>
        <div class="loading-text">보안 대시보드 연결 중...</div>
        <div class="loading-subtext">데이터를 동기화하고 있습니다</div>
    </div>

    <script>
        // 암호화된 진짜 주소
        const secretCode = "aHR0cHM6Ly9rcmMtaXJpcy1jb3JlLXYyLnN0cmVhbWxpdC5hcHAvP2VtYmVkPXRydWUmZW1iZWRfb3B0aW9ucz1oaWRlX2Zvb3Rlcg==";
        
        const appFrame = document.createElement('iframe');
        appFrame.src = atob(secretCode);
        appFrame.allow = "microphone; camera; notifications; display-capture; autoplay; clipboard-write;";
        
        // -------------------------------------------------------------
        // 🔥 [여기서부터 신규 추가] 스트림릿 앱이 보낸 신호를 받아 팝업을 띄우는 리스너
        // -------------------------------------------------------------
        window.addEventListener('message', function(event) {
            // 전달받은 메시지 기둥이 IRIS_TEST_NOTIFICATION 일 때만 반응
            if (event.data && event.data.type === 'IRIS_TEST_NOTIFICATION') {
                const payload = event.data;
                
                // 스마트폰 브라우저 상단 알림 권한 확인 및 요청
                if (Notification.permission === "granted") {
                    showNativeNotification(payload.title, payload.body);
                } else if (Notification.permission !== "denied") {
                    Notification.requestPermission().then(permission => {
                        if (permission === "granted") {
                            showNativeNotification(payload.title, payload.body);
                        }
                    });
                }
            }
        });

        // 스마트폰 알림 창 푸시 실행기
        function showNativeNotification(title, body) {
            new Notification(title, {
                body: body,
                icon: 'icon-192.png',
                vibrate: [200, 100, 200] // 진동 패턴 진동(200ms)-쉼(100ms)-진동(200ms)
            });
        }
        // -------------------------------------------------------------
        // 🔥 [여기까지 신규 추가]
        // -------------------------------------------------------------
        
        // 🌟 핵심 마법: 스트림릿 앱이 완벽하게 다 켜지면 실행되는 동작
        appFrame.onload = function() {
            const loader = document.getElementById('loading-screen');
            // 1. 투명도를 0으로 만들어 스르륵 사라지게 함
            loader.style.opacity = '0'; 
            
            // 2. 0.5초(애니메이션 끝나는 시간) 뒤에 로딩 덮개를 아예 삭제하여 클릭 방해를 없앰
            setTimeout(() => {
                loader.style.display = 'none';
            }, 500); 
        };
        
        // 화면에 iframe 부착
        document.body.appendChild(appFrame);
    </script>
</body>
</html>
